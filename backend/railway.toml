[build]
builder = "NIXPACKS"

[deploy]
# Migrate at start (DB is available). Do NOT run migrate in Build Command.
startCommand = "python manage.py migrate --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --timeout 120 --workers 2"
healthcheckPath = "/api/health/"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
